<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --navy: #0b1220;
  --navy-light: #161f37;
  --navy-card: #1b2540;
  --gold: #d4af37;
  --gold-soft: #f0d98c;
  --cream: #f3ecd9;
  --muted: #8a93ad;
  --green: #3f8f6f;
  --green-soft: #2a4a3d;
  --burgundy: #8a3245;
  --line: rgba(212,175,55,0.18);
}

*{ box-sizing:border-box; }

.htg-app{
  background: radial-gradient(1200px 600px at 50% -10%, #1a2745 0%, var(--navy) 55%) var(--navy);
  color: var(--cream);
  font-family:'Inter', sans-serif;
  min-height: 100vh;
  padding: 18px;
  display:flex;
  flex-direction:column;
  gap:16px;
  max-width: 560px;
  margin: 0 auto;
}

.htg-topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding: 14px 18px;
  background: linear-gradient(180deg, var(--navy-card), var(--navy-light));
  border: 1px solid var(--line);
  border-radius: 14px;
}
.htg-brand{
  font-family:'Playfair Display', serif;
  font-weight:800;
  font-size: 19px;
  letter-spacing: 0.3px;
  color: var(--gold-soft);
}
.htg-brand span{ color: var(--cream); font-weight:600; font-size:11px; display:block; letter-spacing:1.5px; text-transform:uppercase; opacity:0.6; margin-top:2px;}
.htg-stats{ text-align:right; }
.htg-money{ font-size:20px; font-weight:700; color: var(--gold-soft); font-family:'Playfair Display', serif;}
.htg-income{ font-size:12px; color: var(--muted); margin-top:2px;}

.htg-panel{
  background: linear-gradient(180deg, var(--navy-card), var(--navy-light));
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px;
  position: relative;
  overflow:hidden;
}
.htg-panel::before{
  content:"";
  position:absolute; inset:0;
  background: linear-gradient(120deg, transparent 40%, rgba(212,175,55,0.06) 50%, transparent 60%);
  pointer-events:none;
}
.htg-floor-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.htg-floor-emoji{ font-size:34px; }
.htg-floor-name{ font-family:'Playfair Display', serif; font-size:21px; font-weight:700; color:var(--cream); }
.htg-floor-sub{ font-size:12px; color:var(--muted); margin-top:2px; }

.htg-progress-wrap{ margin: 12px 0 16px; }
.htg-progress-label{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:5px; }
.htg-progress-bar{ height:8px; border-radius:6px; background: rgba(255,255,255,0.06); overflow:hidden; }
.htg-progress-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--gold-soft)); transition: width 0.3s ease; }
.htg-progress-fill.done{ background: linear-gradient(90deg, var(--green), #5fc79a); }

.htg-row-2{ display:flex; gap:10px; }
.htg-btn{
  flex:1;
  border:none;
  border-radius: 12px;
  padding: 13px 10px;
  font-family:'Inter', sans-serif;
  font-weight:700;
  font-size: 13px;
  cursor:pointer;
  transition: transform 0.08s ease, filter 0.15s ease;
  color: var(--navy);
}
.htg-btn:active{ transform: scale(0.97); }
.htg-btn-click{
  background: linear-gradient(180deg, var(--gold-soft), var(--gold));
  box-shadow: 0 0 0 1px rgba(212,175,55,0.4), 0 8px 18px -8px rgba(212,175,55,0.6);
  font-size:14px;
}
.htg-btn-hire{
  background: linear-gradient(180deg, #cfd6e8, #aab3cf);
}
.htg-btn:disabled{
  filter: grayscale(0.6) brightness(0.55);
  cursor: not-allowed;
}
.htg-btn small{ display:block; font-weight:500; opacity:0.75; font-size:11px; margin-top:2px;}

.htg-click-zone{ position:relative; }
.htg-float{
  position:absolute;
  left:50%;
  top:0;
  font-weight:700;
  color: var(--gold-soft);
  font-size: 14px;
  pointer-events:none;
  animation: htgFloat 0.9s ease-out forwards;
  white-space:nowrap;
}
@keyframes htgFloat{
  0%{ opacity:1; transform: translate(-50%, 0); }
  100%{ opacity:0; transform: translate(-50%, -42px); }
}

.htg-list-title{ font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin: 4px 4px 8px; }
.htg-building{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height: 320px;
  overflow-y:auto;
  padding-right: 2px;
}
.htg-floor-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 10px 12px;
  border-radius:12px;
  background: var(--navy-card);
  border: 1px solid var(--line);
  cursor:pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.htg-floor-row:hover{ border-color: rgba(212,175,55,0.4); }
.htg-floor-row.active{ border-color: var(--gold); background: linear-gradient(90deg, rgba(212,175,55,0.12), transparent); }
.htg-floor-row.locked{ opacity:0.55; cursor: default; }
.htg-floor-row.completed{ border-color: rgba(63,143,111,0.6); }
.htg-row-emoji{ font-size:20px; width:26px; text-align:center; }
.htg-row-mid{ flex:1; min-width:0; }
.htg-row-name{ font-size:13px; font-weight:600; }
.htg-row-income{ font-size:11px; color:var(--muted); }
.htg-row-right{ font-size:11px; text-align:right; color:var(--muted); white-space:nowrap; }
.htg-row-right.unlock-cost{ color: var(--gold-soft); font-weight:700; }
.htg-check{ color: #5fc79a; font-size:16px; }
.htg-lock{ font-size:14px; }

.htg-toasts{
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index: 50;
  width: calc(100% - 36px);
  max-width: 524px;
  pointer-events:none;
}
.htg-toast{
  background: linear-gradient(180deg, var(--navy-card), var(--navy-light));
  border: 1px solid var(--gold);
  color: var(--gold-soft);
  font-size: 13px;
  font-weight:600;
  padding: 10px 14px;
  border-radius: 10px;
  text-align:center;
  animation: htgToastIn 0.25s ease, htgToastOut 0.4s ease 3.4s forwards;
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
}
@keyframes htgToastIn{ from{ opacity:0; transform: translateY(8px);} to{opacity:1; transform: translateY(0);} }
@keyframes htgToastOut{ to{ opacity:0; transform: translateY(-6px); } }

.htg-footer-note{ font-size:10.5px; color:var(--muted); text-align:center; padding: 2px 8px 0; }
.htg-reset{ background:none; border:none; color:var(--muted); text-decoration:underline; cursor:pointer; font-size:10.5px; font-family:inherit; }
</style>

<div class="htg-app">
  <div class="htg-topbar">
    <div class="htg-brand">Hôtel Excelsior<span>Idle Tycoon</span></div>
    <div class="htg-stats">
      <div class="htg-money" id="htg-money">0 €</div>
      <div class="htg-income" id="htg-income">+0 €/s</div>
    </div>
  </div>

  <div class="htg-panel htg-click-zone" id="htg-clickzone">
    <div class="htg-floor-head">
      <div class="htg-floor-emoji" id="htg-active-emoji">🛎️</div>
      <div>
        <div class="htg-floor-name" id="htg-active-name">Hall d'accueil</div>
        <div class="htg-floor-sub" id="htg-active-sub">0 employé · 0 €/s</div>
      </div>
    </div>

    <div class="htg-progress-wrap">
      <div class="htg-progress-label">
        <span id="htg-progress-text">Progression de l'étage</span>
        <span id="htg-progress-pct">0%</span>
      </div>
      <div class="htg-progress-bar"><div class="htg-progress-fill" id="htg-progress-fill" style="width:0%"></div></div>
    </div>

    <div class="htg-row-2">
      <button class="htg-btn htg-btn-click" id="htg-btn-click">Travailler<small id="htg-click-value">+1 €</small></button>
      <button class="htg-btn htg-btn-hire" id="htg-btn-hire">Embaucher<small id="htg-hire-cost">10 €</small></button>
    </div>
  </div>

  <div>
    <div class="htg-list-title">L'hôtel — étages</div>
    <div class="htg-building" id="htg-building"></div>
  </div>

  <div class="htg-footer-note">
    Sauvegarde automatique activée · <button class="htg-reset" id="htg-reset">réinitialiser la partie</button>
  </div>
</div>

<div class="htg-toasts" id="htg-toasts"></div>

<script>
(function(){

  // ---------------------------------------------------------------
  // CONFIG DES ÉTAGES — modifie ces chiffres pour rééquilibrer le jeu
  // ---------------------------------------------------------------
  const FLOORS = [
    { name:"Hall d'accueil",        emoji:"🛎️", unlockCost:0,           employee:"Réceptionniste",      baseCost:10,          baseIncome:1,        click:1,        goal:50 },
    { name:"Chambres Standard",     emoji:"🛏️", unlockCost:500,         employee:"Femme de ménage",     baseCost:50,          baseIncome:5,        click:5,        goal:250 },
    { name:"Chambres Suites",       emoji:"🛌", unlockCost:5000,        employee:"Concierge",           baseCost:400,         baseIncome:30,       click:25,       goal:1500 },
    { name:"Restaurant",            emoji:"🍽️", unlockCost:50000,       employee:"Chef cuisinier",      baseCost:3000,        baseIncome:150,      click:100,      goal:8000 },
    { name:"Spa & Bien-être",       emoji:"💆", unlockCost:400000,      employee:"Masseur",             baseCost:20000,       baseIncome:800,      click:500,      goal:40000 },
    { name:"Salle de Conférence",   emoji:"🎤", unlockCost:3000000,     employee:"Organisateur",        baseCost:150000,      baseIncome:5000,     click:3000,     goal:250000 },
    { name:"Casino",                emoji:"🎰", unlockCost:25000000,    employee:"Croupier",            baseCost:1000000,     baseIncome:30000,    click:20000,    goal:1500000 },
    { name:"Rooftop Bar",           emoji:"🍹", unlockCost:200000000,   employee:"Barman",              baseCost:7000000,     baseIncome:180000,   click:120000,   goal:9000000 },
    { name:"Piscine Panoramique",   emoji:"🏊", unlockCost:1500000000,  employee:"Maître-nageur",       baseCost:50000000,    baseIncome:1000000,  click:700000,   goal:50000000 },
    { name:"Penthouse VIP",         emoji:"👑", unlockCost:10000000000, employee:"Majordome personnel", baseCost:350000000,   baseIncome:6000000,  click:4000000,  goal:300000000 },
  ];

  const EMPLOYEE_GROWTH = 1.15;     // +15% de coût par employé embauché
  const COMPLETION_BONUS = 1.10;    // +10% de revenus globaux par étage terminé
  const OFFLINE_EFFICIENCY = 0.5;   // 50% des revenus gagnés pendant l'absence
  const OFFLINE_CAP_HOURS = 8;
  const SAVE_KEY = "hotel-tycoon-save";

  let state = {
    money: 20,
    activeFloor: 0,
    globalMult: 1,
    floors: FLOORS.map((f, i) => ({ unlocked: i === 0, employees: 0, completed: false })),
  };

  let storageAvailable = true;

  // ---------------- Helpers ----------------
  function formatMoney(n){
    const sign = n < 0 ? "-" : "";
    n = Math.abs(n);
    if(n < 1000) return sign + n.toFixed(n < 10 ? 1 : 0) + " €";
    const units = [
      [1e12, "Md€"], [1e9, "Md€"], [1e6, "M€"], [1e3, "K€"]
    ];
    if(n >= 1e9) return sign + (n/1e9).toFixed(2) + " Md€";
    if(n >= 1e6) return sign + (n/1e6).toFixed(2) + " M€";
    return sign + (n/1e3).toFixed(2) + " K€";
  }

  function employeeCost(floorIdx){
    const f = FLOORS[floorIdx];
    const owned = state.floors[floorIdx].employees;
    return Math.ceil(f.baseCost * Math.pow(EMPLOYEE_GROWTH, owned));
  }

  function floorIncome(floorIdx){
    const f = FLOORS[floorIdx];
    const fs = state.floors[floorIdx];
    if(!fs.unlocked) return 0;
    return f.baseIncome * fs.employees;
  }

  function totalIncomePerSecond(){
    let sum = 0;
    for(let i=0;i<FLOORS.length;i++) sum += floorIncome(i);
    return sum * state.globalMult;
  }

  function nextLockedIndex(){
    for(let i=0;i<FLOORS.length;i++) if(!state.floors[i].unlocked) return i;
    return -1;
  }

  // ---------------- Actions ----------------
  function clickActiveFloor(){
    const i = state.activeFloor;
    const f = FLOORS[i];
    const fs = state.floors[i];
    if(!fs.unlocked) return;
    const gain = f.click * state.globalMult;
    state.money += gain;
    spawnFloatText("+" + formatMoney(gain));
    render();
  }

  function hireForActiveFloor(){
    const i = state.activeFloor;
    const fs = state.floors[i];
    if(!fs.unlocked) return;
    const cost = employeeCost(i);
    if(state.money >= cost){
      state.money -= cost;
      fs.employees += Math.ceil(fs.employees * 0.1) + 1;
      render();
    }
  }

  function selectFloor(i){
    if(!state.floors[i].unlocked && i !== nextLockedIndex()) return;
    if(state.floors[i].unlocked){
      state.activeFloor = i;
      render();
    } else if(i === nextLockedIndex()){
      tryUnlock(i);
    }
  }

  function tryUnlock(i){
    const f = FLOORS[i];
    if(state.floors[i].unlocked) return;
    if(state.money >= f.unlockCost){
      state.money -= f.unlockCost;
      state.floors[i].unlocked = true;
      state.activeFloor = i;
      showToast("🏗️ " + f.name + " vient d'ouvrir !");
      render();
    }
  }

  function checkCompletions(){
    for(let i=0;i<FLOORS.length;i++){
      const f = FLOORS[i];
      const fs = state.floors[i];
      if(fs.unlocked && !fs.completed && floorIncome(i) >= f.goal){
        fs.completed = true;
        state.globalMult *= COMPLETION_BONUS;
        showToast("✅ " + f.name + " terminé ! Revenus globaux +10%");
      }
    }
  }

  // ---------------- Rendering ----------------
  function spawnFloatText(text){
    const zone = document.getElementById("htg-clickzone");
    const el = document.createElement("div");
    el.className = "htg-float";
    el.textContent = text;
    el.style.left = (45 + Math.random()*10) + "%";
    el.style.top = "8px";
    zone.appendChild(el);
    setTimeout(()=> el.remove(), 950);
  }

  function showToast(msg){
    const wrap = document.getElementById("htg-toasts");
    const el = document.createElement("div");
    el.className = "htg-toast";
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(()=> el.remove(), 3900);
  }

  function render(){
    document.getElementById("htg-money").textContent = formatMoney(state.money);
    document.getElementById("htg-income").textContent = "+" + formatMoney(totalIncomePerSecond()) + "/s";

    const i = state.activeFloor;
    const f = FLOORS[i];
    const fs = state.floors[i];
    const income = floorIncome(i);
    const pct = Math.min(100, (income / f.goal) * 100);

    document.getElementById("htg-active-emoji").textContent = f.emoji;
    document.getElementById("htg-active-name").textContent = f.name;
    document.getElementById("htg-active-sub").textContent = fs.employees + " " + f.employee.toLowerCase() + (fs.employees === 1 ? "" : "s") + " · " + formatMoney(income) + "/s";

    const fillEl = document.getElementById("htg-progress-fill");
    fillEl.style.width = pct + "%";
    fillEl.classList.toggle("done", fs.completed);
    document.getElementById("htg-progress-pct").textContent = fs.completed ? "Terminé ✓" : Math.floor(pct) + "%";
    document.getElementById("htg-progress-text").textContent = fs.completed ? "Étage terminé" : "Objectif : " + formatMoney(f.goal) + "/s";

    document.getElementById("htg-click-value").textContent = "+" + formatMoney(f.click * state.globalMult);
    const hireBtn = document.getElementById("htg-btn-hire");
    const cost = employeeCost(i);
    document.getElementById("htg-hire-cost").textContent = formatMoney(cost);
    hireBtn.disabled = state.money < cost;

    renderBuilding();
  }

  function renderBuilding(){
    const wrap = document.getElementById("htg-building");
    wrap.innerHTML = "";
    const nextIdx = nextLockedIndex();

    // affichage du dernier étage en haut, du hall en bas (vue "bâtiment")
    for(let i = FLOORS.length - 1; i >= 0; i--){
      const f = FLOORS[i];
      const fs = state.floors[i];
      const row = document.createElement("div");
      row.className = "htg-floor-row" +
        (fs.unlocked ? "" : " locked") +
        (i === state.activeFloor && fs.unlocked ? " active" : "") +
        (fs.completed ? " completed" : "");

      const emoji = document.createElement("div");
      emoji.className = "htg-row-emoji";
      emoji.textContent = fs.unlocked ? f.emoji : "🔒";
      row.appendChild(emoji);

      const mid = document.createElement("div");
      mid.className = "htg-row-mid";
      const nameEl = document.createElement("div");
      nameEl.className = "htg-row-name";
      nameEl.textContent = f.name;
      mid.appendChild(nameEl);
      const incEl = document.createElement("div");
      incEl.className = "htg-row-income";
      incEl.textContent = fs.unlocked ? formatMoney(floorIncome(i)) + "/s" : "verrouillé";
      mid.appendChild(incEl);
      row.appendChild(mid);

      const right = document.createElement("div");
      right.className = "htg-row-right";
      if(fs.completed){
        right.innerHTML = '<span class="htg-check">✓</span>';
      } else if(!fs.unlocked && i === nextIdx){
        right.classList.add("unlock-cost");
        right.textContent = formatMoney(f.unlockCost);
      } else if(!fs.unlocked){
        right.textContent = "—";
      }
      row.appendChild(right);

      row.addEventListener("click", () => selectFloor(i));
      wrap.appendChild(row);
    }
  }

  // ---------------- Save / Load ----------------
  async function saveGame(){
    if(!storageAvailable) return;
    try{
      const payload = JSON.stringify({ ...state, lastSave: Date.now() });
      const result = await window.storage.set(SAVE_KEY, payload);
      if(!result) storageAvailable = false;
    }catch(e){
      console.error("Échec de la sauvegarde :", e);
      storageAvailable = false;
    }
  }

  async function loadGame(){
    try{
      const result = await window.storage.get(SAVE_KEY);
      if(result && result.value){
        const saved = JSON.parse(result.value);
        state.money = saved.money;
        state.activeFloor = saved.activeFloor;
        state.globalMult = saved.globalMult;
        state.floors = saved.floors;

        const elapsedMs = Date.now() - (saved.lastSave || Date.now());
        const elapsedSec = Math.min(elapsedMs / 1000, OFFLINE_CAP_HOURS * 3600);
        if(elapsedSec > 30){
          const gain = totalIncomePerSecond() * elapsedSec * OFFLINE_EFFICIENCY;
          state.money += gain;
          const hours = (elapsedSec/3600).toFixed(1);
          showToast("👋 Bon retour ! +" + formatMoney(gain) + " gagnés pendant " + hours + "h d'absence");
        }
      }
    }catch(e){
      // pas de sauvegarde existante ou stockage indisponible — on démarre une nouvelle partie
      console.log("Nouvelle partie (pas de sauvegarde trouvée).");
    }
  }

  async function resetGame(){
    state = {
      money: 20,
      activeFloor: 0,
      globalMult: 1,
      floors: FLOORS.map((f, i) => ({ unlocked: i === 0, employees: 0, completed: false })),
    };
    try{ await window.storage.delete(SAVE_KEY); }catch(e){}
    render();
  }

  // ---------------- Game loop ----------------
  let lastTick = performance.now();
  function tick(){
    const now = performance.now();
    const dt = (now - lastTick) / 1000;
    lastTick = now;
    state.money += totalIncomePerSecond() * dt;
    checkCompletions();
    render();
    requestAnimationFrame(tick);
  }

  // ---------------- Init ----------------
  document.getElementById("htg-btn-click").addEventListener("click", clickActiveFloor);
  document.getElementById("htg-btn-hire").addEventListener("click", hireForActiveFloor);
  document.getElementById("htg-reset").addEventListener("click", () => {
    if(confirm("Réinitialiser toute la partie ?")) resetGame();
  });

  loadGame().then(() => {
    render();
    requestAnimationFrame(tick);
    setInterval(saveGame, 5000);
  });

})();
</script>
